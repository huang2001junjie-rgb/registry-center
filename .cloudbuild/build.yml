
---
version: 2.0

#构建环境
env:
  resource:
    type: docker
    image: szvecr02.his.huawei.com:80/ecr-build/euleros_v2r13spc100_x64_opmt_cs8.1:v3.0
    class: 7U15G
    pool: docker-sz-service-x86-ondocker-32u-01
    mode: toolbox


#构建参数定义, 构建脚本可从环境变量中读取使用这些参数
params:
  - name: product
    value: cloudbuild2.0

#构建步骤
steps:
  PRE_BUILD: # 构建准备步骤
    - checkout # 检出当前源码库
  BUILD: # 构建执行步骤
    - build_execute: # 执行构建
        command: "echo hello ${product}." # 构建命令，如sh build.sh 或 make 或 mvn clean package
        accelerate: false # 是否启用分布式加速(jiffy)
        check: true # 是否启用构建检查
    